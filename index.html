1: {
multi1: [
{

  { q: "공익사업과 관련하여 지상권이나 지역권을 설정하거나 대여하고 받는 소득은 세법상 어느 소득으로 분류되는가?", a: "기타소득 (사업소득 아님)" },
  { q: "미등기 다가구주택의 보유주택 수 계산 원칙?", a: "1개 (전체를 하나의 주택으로 간주)" },
  { q: "부동산임대업 소득세의 납세의무 성립시기?", a: "과세기간이 끝나는 때 (12월 31일)" },
  { q: "거주자의 부동산임대업 소득세 납세지 기준?", a: "거주자의 주소지" },
  { q: "5월 31일까지 수행하는 소득세 신고의 정확한 명칭?", a: "종합소득 과세표준 확정신고" }]
    }
};

let curWeek = 1; let curType = ''; let curIdx = 0;
let userAnswers = {}; let clickCounts = {};
let flashIdx = 0; let isFlashFlipping = false;
let allowedMaxIdx = 4;

const STAMPS = { 100: "출석도장 100점.png", 80: "출석도장 80점 이상.png", 50: "출석도장 50점 이상.png", check: "✔" };
const ALL_PAGES = ['menu-page', 'quiz-page', 'flash-card-page', 'member-page', 'result-page', 'my-only-page', 'archive-page'];

const openDates = {
    0: { date: "2026-06-08", label: "6월 8일 (월)" },
    1: { date: "2026-06-09", label: "6월 9일 (화)" },
    2: { date: "2026-06-10", label: "6월 10일 (수)" },
    3: { date: "2026-06-11", label: "6월 11일 (목)" },
    4: { date: "2026-06-12", label: "6월 12일 (금)" },
    5: { date: "2026-06-13", label: "6월 13일 (주말)" }
};

function getTodayMaxIdx() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9)); // 한국 시간 변환
    
    // 🛠️ [선생님 핵심 요청 반영] 현재 한국 시각에서 '7시간'을 뺍니다.
    // 이렇게 하면 오전 6시 59분까지는 전부 '어제 날짜'로 강제 계산됩니다.
    kst.setHours(kst.getHours() - 7);
    
    // 7시간이 빠진 상태의 날짜 문자열 생성 (예: 수요일 오전 6시면 화요일 날짜가 생성됨)
    const todayStr = `${kst.getFullYear()}-${String(kst.getMonth() + 1).padStart(2, '0')}-${String(kst.getDate()).padStart(2, '0')}`;
    const latestWeek = Object.keys(weekData).length;

    // 1. 해당 주차가 지난 과거 주차라면 수요일이든 금요일이든 무조건 전체 개방(4)
    if (curWeek < latestWeek) {
        return 4;
    }
    
    // 2. 이번 주차 학습일 때는 7시간을 뺀 오늘 날짜를 기준으로만 누적 개방
    let currentMax = 0;
    for (let i = 0; i <= 4; i++) {
        if (todayStr >= openDates[i].date) currentMax = i;
    }
    return currentMax;
}

function checkDateAndStart(targetIdx) {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    const kst = new Date(utc + (3600000 * 9));
    
    // 여기도 동일하게 7시간을 빼서 판정 기준을 아침 7시로 동기화합니다.
    kst.setHours(kst.getHours() - 7);
    const todayStr = `${kst.getFullYear()}-${String(kst.getMonth() + 1).padStart(2, '0')}-${String(kst.getDate()).padStart(2, '0')}`;
    const latestWeek = Object.keys(weekData).length;

    // 지난 주차라면 차단 없이 바로 통과
    if (curWeek < latestWeek) {
        allowedMaxIdx = 4;
        startQuiz('multi1', targetIdx);
        return;
    }
    
    // 7시가 안 넘어서 날짜가 아직 도달하지 못했다면 명확하게 차단 멘트 출력
    if (todayStr < openDates[targetIdx].date) {
        alert(`해당 문제는 ${openDates[targetIdx].label} 아침 07시에 공개됩니다. 조금만 기다려주세요! 🔥`);
        return;
    }
    
    allowedMaxIdx = getTodayMaxIdx();
    startQuiz('multi1', targetIdx);
}

function startQuizWithTodayMax() {
    allowedMaxIdx = getTodayMaxIdx();
    startQuiz('multi1', 0);
}

function hideAllPages() {
    ALL_PAGES.forEach(id => {
        const p = document.getElementById(id);
        if (p) p.style.display = 'none';
    });
}

function switchWeek(w) {
    curWeek = w;
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1 === w));
    showMenu();
}

function showMenu() {
    hideAllPages();
    document.getElementById('menu-page').style.display = 'block';
    document.getElementById('day-nav-wrapper').style.display = 'none';
    document.getElementById('ox-title').style.display = 'none';
    document.getElementById('m-btn-label').innerText = `소득세 ${curWeek}주차`;
    document.getElementById('o-btn-label').innerText = `소득세 ${curWeek}주차 OX 퀴즈`;
    updateAttendanceBar();
}

function startQuiz(type, index = 0) {
    curType = type; curIdx = index; userAnswers = {}; clickCounts = {};
    const data = weekData[curWeek][type];
    if(!data || data.length === 0) { alert("준비 중입니다."); return; }
    
    hideAllPages();
    document.getElementById('quiz-page').style.display = 'flex';
    if(type === 'ox1') {
        document.getElementById('ox-title').style.display = 'block';
        document.getElementById('ox-title').innerText = `소득세 ${curWeek}주차 핵심 OX`;
        document.getElementById('options-ox').style.display = 'flex';
        document.getElementById('options-multi').style.display = 'none';
        document.getElementById('day-nav-wrapper').style.display = 'none';
    } else {
        document.getElementById('day-nav-wrapper').style.display = 'flex';
        document.getElementById('options-ox').style.display = 'none';
        document.getElementById('options-multi').style.display = 'grid';
        document.getElementById('ox-title').style.display = 'none';
    }
    showQ();
}

function showQ() {
    const data = weekData[curWeek][curType][curIdx];
    document.getElementById('q-text').innerHTML = data.q.replace(
        /틀린/g, 
        "<span style='color: #dc2626; text-decoration: underline; font-weight: 900; font-size: 1.25rem; text-underline-offset: 5px;'>틀린</span>"
    );
    document.getElementById('exp-box').style.display = 'none';
    const dayCircles = document.querySelectorAll('.day-circle');
    dayCircles.forEach((c, i) => c.classList.toggle('active', i <= curIdx));
    
    if(curType === 'ox1') {
        document.getElementById('btn-O').className = 'ox-btn';
        document.getElementById('btn-X').className = 'ox-btn';
    } else {
        const mBox = document.getElementById('options-multi');
        mBox.innerHTML = '';
        data.choices.forEach((txt, i) => {
            const isStarred = checkIsStarred(curIdx, i+1);
            mBox.innerHTML += `
            <div class="choice-item">
                <div style="display:flex; align-items:center; flex:1;" onclick="handleMulti(${i+1})">
                    <div class="choice-num">${i+1}</div>
                    <div style="text-align:left;">${txt}</div>
                </div>
                <span class="star-btn ${isStarred?'active':''}" onclick="toggleStar(event, ${curIdx}, ${i+1})">${isStarred?'★':'☆'}</span>
            </div>
            <div id="e-${i+1}" class="explanation-box" style="font-size:0.9rem"> ${data.exps[i]}</div>`;
        });
    }
    document.getElementById('prev-btn').disabled = (curIdx === 0);
    
    if (curIdx === weekData[curWeek][curType].length - 1 || (curType === 'multi1' && curIdx === allowedMaxIdx)) {
        document.getElementById('next-btn').innerText = '학습 종료';
    } else {
        document.getElementById('next-btn').innerText = '다음 ▶';
    }
}

function handleMulti(n) {
    const targetExp = document.getElementById(`e-${n}`);
    const targetChoice = document.querySelectorAll('.choice-item')[n-1];
    const data = weekData[curWeek][curType][curIdx];
    targetExp.style.display = (targetExp.style.display === 'block') ? 'none' : 'block';
    if(userAnswers[curIdx] === true || (clickCounts[curIdx] || 0) >= 2) return;
    clickCounts[curIdx] = (clickCounts[curIdx] || 0) + 1;
    if(n === data.a) {
        userAnswers[curIdx] = true;
        document.getElementById('snd-correct').play();
        targetChoice.classList.add('selected');
        createFirework(targetChoice.querySelector('.choice-num'));
    } else {
        saveToMyOnly(curIdx, n, false);
        if(clickCounts[curIdx] >= 2) userAnswers[curIdx] = false;
    }
}

function saveToMyOnly(qIdx, oIdx, isStar) {
    let storage = JSON.parse(localStorage.getItem('my_only_raw') || "[]");
    if(!storage.find(d => d.w===curWeek && d.t===curType && d.q===qIdx && d.o===oIdx)) {
        storage.push({ w:curWeek, t:curType, q:qIdx, o:oIdx, s:isStar, d:new Date().toLocaleDateString() });
        localStorage.setItem('my_only_raw', JSON.stringify(storage));
    }
}

function checkIsStarred(q, o) {
    return JSON.parse(localStorage.getItem('my_only_raw') || "[]").some(d => d.w===curWeek && d.t===curType && d.q===q && d.o===o && d.s===true);
}

function toggleStar(event, qIdx, oIdx) {
    event.stopPropagation();
    const star = event.target;
    star.classList.toggle('active');
    if(star.classList.contains('active')) {
        star.innerText = "★";
        saveToMyOnly(qIdx, oIdx, true);
    } else {
        star.innerText = "☆";
    }
}

function handleOX(choice) {
    const data = weekData[curWeek][curType][curIdx];
    if(userAnswers[curIdx] === true || (clickCounts[curIdx] || 0) >= 2) {
        document.getElementById('exp-box').style.display = (document.getElementById('exp-box').style.display === 'block') ? 'none' : 'block';
        return;
    }
    clickCounts[curIdx] = (clickCounts[curIdx] || 0) + 1;
    const isCorrect = (choice === data.a);
    if(isCorrect) {
        userAnswers[curIdx] = true;
        document.getElementById('snd-correct').play();
        createFirework(document.getElementById(choice === 'O' ? 'btn-O' : 'btn-X'));
    } else {
        saveToMyOnly(curIdx, 9, false);
        if(clickCounts[curIdx] >= 2) userAnswers[curIdx] = false;
    }
    document.getElementById('exp-box').innerText = data.exp;
    document.getElementById('exp-box').style.display = 'block';
}

function goPrev() { if(curIdx > 0) { curIdx--; showQ(); } }

function handleNext() { 
    if (curType === 'multi1' && curIdx === allowedMaxIdx) {
        finish();
        return;
    }
    if(curIdx < weekData[curWeek][curType].length - 1) { 
        curIdx++; 
        showQ(); 
    } else {
        finish(); 
    } 
}

function finish() {
    // 🛠️ [점수 버그 전면 수정] 전체 5문제 기준이 아니라, 수험생이 오늘 '실제로 진입해서 풀어낸 문제 수'를 유연하게 계산하도록 변경!
    // 만약 월요일 도장을 누르면 딱 1문제만 푸니까 total이 1이 되어, 다 맞히면 정상적으로 100점이 나오게 장치 완료!
    const total = (curType === 'multi1') ? (allowedMaxIdx + 1) : weekData[curWeek][curType].length;
    let correctCount = 0;
    for(let k in userAnswers) if(userAnswers[k]) correctCount++;
    const score = Math.round((correctCount/total)*100);
    const stampIdx = (curType === 'ox1') ? 5 : curIdx;
    const saved = JSON.parse(localStorage.getItem(`att_w${curWeek}`) || "{}");
    saved[stampIdx] = { score: score };
    if (curType === 'multi1' && stampIdx === 4) {
        if (score === 100) {
            for (let i = 0; i <= 4; i++) if (saved.hasOwnProperty(i)) saved[i].score = 100;
        } else if (score < 50) {
            for (let i = 0; i <= 4; i++) if (saved.hasOwnProperty(i)) saved[i].score = 0;
        }
    }
    localStorage.setItem(`att_w${curWeek}`, JSON.stringify(saved));
    updateAttendanceBar();
    hideAllPages();
    document.getElementById('result-page').style.display = 'flex';
    document.getElementById('res-score').innerText = `${score}점`;
    let m = ""; let i = "";
    if(score === 100) { m = "완벽합니다!\n지금의 감각을 끝까지 유지하세요! 💯"; i = "✨🎉"; }
    else if(score >= 80) { m = "우수한 성적입니다!\n실수만 줄이면 충분히 만점도 가능합니다!"; i = "😎🙌"; }
    else if(score >= 70) { m = "안정적인 점수입니다!\n고득점 굳히기 들어갑시다!"; i = "🎯👍"; }
    else if(score >= 60) { m = "합격권입니다!\n흔들리지 않게 기초를 한 번 더 다지는 것이 중요합니다!"; i = "✅👏"; }
    else if(score >= 50) { m = "조금 더 힘내봅시다!\n개념 공부를 조금만 더 보충해볼까요?"; i = "🏃‍♂️🔥"; }
    else { m = "기초부터 차근차근 다시 시작해봅시다!🌱"; i = "📝🌱"; }
    document.getElementById('res-comment').innerText = m;
    document.getElementById('res-img').innerText = i;
}

function updateAttendanceBar() {
    const saved = JSON.parse(localStorage.getItem(`att_w${curWeek}`) || "{}");
    for(let i=0; i<6; i++) {
        const slot = document.getElementById(`s-${i}`); slot.innerHTML = ''; slot.className = 'stamp-circle';
        if(saved.hasOwnProperty(i)) {
            const s = saved[i].score;
            if(s >= 50) {
                const img = document.createElement('img');
                img.src = s === 100 ? STAMPS[100] : (s >= 80 ? STAMPS[80] : STAMPS[50]);
                if (s >= 80 && s < 100) {
                    img.style.transform = "scale(0.92)";
                } else if (s === 100) {
                    img.style.transform = "scale(1.1)";
                }
                slot.appendChild(img);
            } else { slot.innerText = STAMPS.check; slot.classList.add('check'); }
        }
    }
}

function handleMyOnlyClick() {

    const savedCode = localStorage.getItem('funfun_user_code');
    if (savedName && savedCode === "ft5273") { showMyOnlyPage(); } else { showAuthPage(); }
}

function renderWrongAnswers() {
    const listArea = document.getElementById('wrong-answer-list');
    const subtitleArea = document.getElementById('my-only-subtitle');
    if (!listArea) return;
    
    const rawData = JSON.parse(localStorage.getItem('my_only_raw') || "[]");
    if (subtitleArea) {
        subtitleArea.innerHTML = rawData.length === 0 
            ? "복습할 지문이 없습니다. 😊" 
            : `총 <span style="color:var(--my-only-pink); font-weight:800;">${rawData.length}개</span>의 지문을 점검 중입니다.`;
    }

    if (rawData.length === 0) {
        listArea.innerHTML = '<p style="text-align: center; color: #94a3b8; margin-top: 80px;">오답 노트가 비어있습니다.</p>';
        return;
    }

    const groupedData = rawData.reduce((acc, item) => {
        if (!acc[item.w]) acc[item.w] = [];
        acc[item.w].push(item);
        return acc;
    }, {});

    let html = ""; 
    Object.keys(groupedData).sort().forEach(week => {
        html += `
            <div style="background: #fff; border: 1px solid #f1f5f9; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                <div style="font-size: 0.85rem; font-weight: 800; color: var(--my-only-pink); margin-bottom: 15px; border-bottom: 1px solid #fff1f2; padding-bottom: 8px;">
                    WEEK ${week} 복습 리스트
                </div>
        `;
        groupedData[week].forEach((item) => {
            const questionObj = weekData[item.w]?.[item.t]?.[item.q];
            if (questionObj) {
                const statement = (item.t === 'ox1') ? questionObj.q : questionObj.choices[item.o - 1];
                let rawExp = (item.t === 'ox1') ? questionObj.exp : questionObj.exps[item.o - 1];
                let cleanExp = rawExp.replace(/정답입니다!|정답!/g, "").replace(/^해설[:\s]*/, "").trim();

                html += `
                    <div style="margin-bottom: 22px; text-align: left; position: relative; padding-right: 55px;">
                        <div style="font-size: 0.92rem; color: #475569; line-height: 1.5; margin-bottom: 8px; font-weight: 700; word-break: keep-all;">
                            ${statement}
                        </div>
                        <div style="font-size: 0.85rem; color: #1e293b; background: #f8fafc; padding: 10px; border-radius: 10px; line-height: 1.4; border-left: 3px solid var(--my-only-pink);">
                            <span style="font-weight: 800; color: var(--my-only-pink); margin-right: 4px;">➔</span> ${cleanExp}
                        </div>
                        <button type="button" onclick="moveToArchiveFromList(${item.w}, '${item.t}', ${item.q})" style="position: absolute; top: 0; right: 0; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 8px; font-size: 0.65rem; color: #64748b; cursor: pointer; font-weight: 700;">보관함</button>
                    </div>
                `;
            }
        });
        html += `</div>`; 
    });
    listArea.innerHTML = html;
}

function moveToArchiveFromList(w, t, q) {
    let raw = JSON.parse(localStorage.getItem('my_only_raw') || "[]");
    let archive = JSON.parse(localStorage.getItem('my_only_archive') || "[]");
    const targetIdx = raw.findIndex(item => item.w === w && item.t === t && item.q === q);
    if (targetIdx > -1) {
        const movedItem = raw.splice(targetIdx, 1)[0];
        archive.push(movedItem);
        localStorage.setItem('my_only_raw', JSON.stringify(raw));
        localStorage.setItem('my_only_archive', JSON.stringify(archive));
        renderWrongAnswers(); 
        alert("보관함으로 이동되었습니다! 😊");
    }
}

function renderArchiveItems() {
    const archiveArea = document.getElementById('archive-list');
    if (!archiveArea) return;
    const archiveData = JSON.parse(localStorage.getItem('my_only_archive') || "[]");
    
    if (archiveData.length === 0) {
        archiveArea.innerHTML = '<p style="text-align: center; color: #94a3b8; margin-top: 50px;">보관함이 비어 있습니다. 😊</p>';
        return;
    }

    const groupedData = archiveData.reduce((acc, item, idx) => {
        const week = item.w || "기타";
        if (!acc[week]) acc[week] = [];
        acc[week].push({ ...item, originalIdx: idx });
        return acc;
    }, {});

    let html = `<p style="color:#475569; font-weight:800; text-align:left; padding:5px 10px; font-size:0.85rem; margin-bottom:10px;">정복 완료된 지문: ${archiveData.length}개</p>`;
    
    Object.keys(groupedData).sort().forEach(week => {
        html += `
            <div style="background: #fff; border: 1px solid #f1f5f9; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                <div style="font-size: 0.85rem; font-weight: 800; color: #94a3b8; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px;">
                    WEEK ${week} 복습 완료
                </div>
        `;
        groupedData[week].forEach((item) => {
            const questionObj = weekData[item.w]?.[item.t]?.[item.q];
            if (questionObj) {
                const statement = (item.t === 'ox1') ? questionObj.q : questionObj.choices[item.o - 1];
                let rawExp = (item.t === 'ox1') ? questionObj.exp : questionObj.exps[item.o - 1];
                let cleanExp = rawExp.replace(/정답입니다!|정답!/g, "").replace(/^해설[:\s]*/, "").trim();

                html += `
                    <div style="margin-bottom: 22px; text-align: left; position: relative; padding-right: 55px;">
                        <button type="button" onclick="restoreFromArchive(${item.originalIdx})" style="position: absolute; top: 0; right: 0; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px 8px; font-size: 0.65rem; color: #3b82f6; cursor: pointer; font-weight: 700;">복원</button>
                        <div style="font-size: 0.92rem; color: #475569; line-height: 1.5; margin-bottom: 8px; font-weight: 700; word-break: keep-all; padding-right: 10px;">
                            ${statement}
                        </div>
                        <div style="font-size: 0.85rem; color: #1e293b; background: #f8fafc; padding: 10px; border-radius: 10px; line-height: 1.4; border-left: 3px solid #cbd5e1;">
                            <span style="font-weight: 800; color: #94a3b8; margin-right: 4px;">➔</span> ${cleanExp}
                        </div>
                    </div>
                `;
            }
        });
        html += `</div>`; 
    });
    archiveArea.innerHTML = html;
}

function restoreFromArchive(idx) {
    let raw = JSON.parse(localStorage.getItem('my_only_raw') || "[]");
    let archive = JSON.parse(localStorage.getItem('my_only_archive') || "[]");
    const restoredItem = archive.splice(idx, 1)[0];
    raw.push(restoredItem);
    localStorage.setItem('my_only_raw', JSON.stringify(raw));
    localStorage.setItem('my_only_archive', JSON.stringify(archive));
    renderArchiveItems();
    alert("오답노트로 다시 복원되었습니다! 🔄");
}

function startFlashQuiz() {
    const data = weekData[curWeek].flash;
    if (!data || data.length === 0) {
        alert("이번 주차 플래시 카드는 토요일에 업데이트됩니다. 준비 중입니다!");
        return;
    }
    hideAllPages();
    document.getElementById('flash-card-page').style.display = 'flex';
    flashIdx = 0;
    showFlashCard();
}

function showFlashCard() {
    const data = weekData[curWeek].flash;
    const card = document.getElementById('main-flash-card');
    card.classList.remove('flipped');
    document.getElementById('flash-progress').innerText = `${flashIdx + 1} / ${data.length}`;
    document.getElementById('flash-q-text').innerText = data[flashIdx].q;
    document.getElementById('flash-hint-text').innerText = ` ${data[flashIdx].h}`;
    document.getElementById('flash-a-text').innerText = data[flashIdx].a;

    const prevBtn = document.getElementById('flash-prev-btn');
    if (prevBtn) {
        if (flashIdx === 0) {
            prevBtn.disabled = true;
            prevBtn.style.color = "#cbd5e1"; prevBtn.style.borderColor = "#e2e8f0"; prevBtn.style.background = "#f8fafc";
        } else {
            prevBtn.disabled = false;
            prevBtn.style.color = "var(--point-blue)"; prevBtn.style.borderColor = "var(--soft-blue)"; prevBtn.style.background = "#fff";
        }
    }
}

// 꽃가루 효과 연출 함수 완벽 독립 배치
function createFirework(parent) {
    const colors = ['#60a5fa', '#3b82f6', '#4ade80', '#fbbf24', '#f87171'];
    for(let i=0; i<15; i++) {
        const p = document.createElement('div'); p.className = 'particle';
        const angle = Math.random() * Math.PI * 2; const dist = 40 + Math.random() * 40;
        p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`); p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = '50%'; p.style.top = '50%'; p.style.animation = `firework 0.8s ease-out forwards`;
        parent.appendChild(p); setTimeout(() => p.remove(), 1000);
    }
}

function handleCardClick() {
    const card = document.getElementById('main-flash-card');
    if (card.classList.contains('flipped')) { goNextFlash(); } else { card.classList.add('flipped'); }
}

function goNextFlash() {
    const data = weekData[curWeek].flash;
    if (flashIdx < data.length - 1) { flashIdx++; showFlashCard(); } else { finishFlashQuiz(); }
}

function goPrevFlash() { if (flashIdx > 0) { flashIdx--; showFlashCard(); } }

function finishFlashQuiz() {
    hideAllPages();
    document.getElementById('result-page').style.display = 'flex';
    document.getElementById('res-score').innerText = "⚡ 완료";
    document.getElementById('res-comment').innerText = "작은 습관이 큰 차이를 만든다!";
    document.getElementById('res-img').innerText = "⚡";
}

function updateWelcomeMessage(name) {
    const welcomeArea = document.getElementById('welcome-message');
    const sayings = ["작은 습관이 큰 차이를 만듭니다!", "오늘의 노력이 내일의 합격이 됩니다!", "이미 충분히 잘하고 계십니다!", "합격의 그날까지, 끝까지 함께하겠습니다!", "당신의 꿈을 진심으로 응원합니다!"];
    const randomSaying = sayings[Math.floor(Math.random() * sayings.length)];
    if (welcomeArea) { welcomeArea.innerHTML = `<span style="color:var(--point-blue); font-weight: 800;">${name} 님,</span><br>${randomSaying}`; }
}

document.addEventListener('DOMContentLoaded', () => {
    const savedName = localStorage.getItem('funfun_user_name');
    const savedCode = localStorage.getItem('funfun_user_code');

    if(typeof weekData !== 'undefined') {
        const lastWeek = Object.keys(weekData).length;
        if(typeof switchWeek === 'function') switchWeek(lastWeek);
    }

    if (savedName && savedCode === "ft5273") {
        showMenu(); updateWelcomeMessage(savedName);
    } else {
        const welcomeArea = document.getElementById('welcome-message');
        if (welcomeArea) { welcomeArea.innerHTML = "반갑습니다! 👋<br>오늘도 즐겁게 열공해봐요!"; }
    }
});
</script>
